<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live do luffysdrk - Blox Fruits</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121214;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #202024;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #00e676; }
        .btn-opcao {
            background: #29292e;
            color: white;
            border: 2px solid #00e676;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-opcao:hover { background: #00e676; color: black; }
        .contador { font-weight: bold; color: #00e676; margin-top: 5px; }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        .btn-enviar {
            background: #00e676;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Área Restrita */
        #area-restrita {
            margin-top: 30px;
            padding: 20px;
            border-top: 2px dashed #444;
        }
        .secao-admin {
            background: #1a1a1e;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }
        .escondido { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Qual o conteúdo da Live de hoje?</h1>
    <p>Vote na sua opção favorita ou sugira algo abaixo!</p>

    <!-- Opções de Voto -->
    <div>
        <button class="btn-opcao" onclick="votar('opcao1')">Caçar Frutas / Spawnar Boss</button>
        <div class="contador">Votos: <span id="votos-opcao1">0</span></div>
    </div>
    
    <div>
        <button class="btn-opcao" onclick="votar('opcao2')">PvP com Seguidores</button>
        <div class="contador">Votos: <span id="votos-opcao2">0</span></div>
    </div>

    <div>
        <button class="btn-opcao" onclick="votar('opcao3')">Ajudando em Raids</button>
        <div class="contador">Votos: <span id="votos-opcao3">0</span></div>
    </div>

    <hr style="border: 1px solid #323238; margin: 30px 0;">

    <!-- Seção de Sugestão -->
    <h3>Tem outra ideia? Sugira aqui:</h3>
    
    <!-- Passo 1: Digitar a sugestão -->
    <div id="passo-sugestao">
        <input type="text" id="input-sugestao" placeholder="Ex: Girar fruta e dar pro chat...">
        <br>
        <button class="btn-enviar" onclick="proximoPasso()">Avançar</button>
    </div>

    <!-- Passo 2: Digitar o nome (Escondido no início) -->
    <div id="passo-nome" class="escondido">
        <p>Agora, digite seu nome do TikTok/Roblox:</p>
        <input type="text" id="input-nome" placeholder="Seu nome/Nick...">
        <br>
        <button class="btn-enviar" onclick="enviarSugestao()">Enviar Sugestão</button>
    </div>

    <!-- Botão de Login do Admin (Soca sumirá quando logado) -->
    <div id="div-botao-login" style="margin-top: 40px;">
        <button style="background:transparent; color:#555; border:none; cursor:pointer;" onclick="fazerLogin()">Lugar Restrito (Admin)</button>
    </div>

    <!-- Área Restrita (Só aparece para você após o login) -->
    <div id="area-restrita" class="escondido">
        <h2 style="color: #ffd700;">Painel do luffysdrk</h2>
        <p>Sugestões enviadas pelos fãs:</p>
        <div class="secao-admin" id="lista-sugestoes">
            <!-- As sugestões vão aparecer aqui -->
            <p style="color:#888;">Nenhuma sugestão enviada ainda nesta sessão.</p>
        </div>
        <button onclick="deslogar()" style="margin-top:10px; background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Sair do Painel</button>
    </div>
</div>

<script>
    // --- Sistema de Votos Locais ---
    function votar(idOpcao) {
        let elemento = document.getElementById('votos-' + idOpcao);
        let votosAtuais = parseInt(elemento.innerText);
        elemento.innerText = votosAtuais + 1;
    }

    // --- Sistema de Fluxo de Sugestão ---
    let sugestaoTemporaria = "";

    function proximoPasso() {
        let sugestao = document.getElementById('input-sugestao').value;
        if(sugestao.trim() === "") {
            alert("Digite uma sugestão primeiro!");
            return;
        }
        sugestaoTemporaria = sugestao;
        document.getElementById('passo-sugestao').classList.add('escondido');
        document.getElementById('passo-nome').classList.remove('escondido');
    }

    function enviarSugestao() {
        let nome = document.getElementById('input-nome').value;
        if(nome.trim() === "") {
            alert("Digite seu nome!");
            return;
        }

        // Salva na lista (visível apenas na sessão atual do admin)
        adicionarSugestaoAoPainel(nome, sugestaoTemporaria);

        alert("Obrigado! Sua sugestão foi enviada para o luffysdrk.");
        
        // Reseta o formulário
        document.getElementById('input-sugestao').value = "";
        document.getElementById('input-nome').value = "";
        document.getElementById('passo-nome').classList.add('escondido');
        document.getElementById('passo-sugestao').classList.remove('escondido');
    }

    function adicionarSugestaoAoPainel(nome, texto) {
        let lista = document.getElementById('lista-sugestoes');
        if(lista.innerHTML.includes("Nenhuma sugestão enviada")) {
            lista.innerHTML = "";
        }
        lista.innerHTML += `<p><strong>${nome}:</strong> ${texto}</p>`;
    }

    // --- Sistema de Login do Admin (luffysdrk) ---
    // Verifica se você já estava logado antes
    if(localStorage.getItem('logado') === 'true') {
        mostrarPainelAdmin();
    }

    function fazerLogin() {
        let usuarioInput = prompt("Digite seu usuário:");
        let senhaInput = prompt("Digite sua senha:");

        // ATENÇÃO: Seus dados solicitados estão aqui.
        if(usuarioInput === "luffysdrk" && senhaInput === "deussssssss8") {
            localStorage.setItem('logado', 'true');
            mostrarPainelAdmin();
            alert("Bem-vindo de volta, luffysdrk!");
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }

    function mostrarPainelAdmin() {
        document.getElementById('area-restrita').classList.remove('escondido');
        document.getElementById('div-botao-login').classList.add('escondido'); // Esconde o botão para os outros
    }

    function deslogar() {
        localStorage.removeItem('logado');
        document.getElementById('area-restrita').classList.add('escondido');
        document.getElementById('div-botao-login').classList.remove('escondido');
    }
</script>

</body>
</html>
