<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live do luffysdrk - Blox Fruits</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-image: linear-gradient(rgba(18, 18, 20, 0.8), rgba(18, 18, 20, 0.8)), url('258d8fb0c87008b7e54db90f15a0f5ce~tplv-tiktokx-cropcenter_100_100.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(32, 32, 36, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        h1 { color: #00e676; }
        .btn-opcao {
            background: #29292e;
            color: white;
            border: 2px solid #00e676;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-opcao:hover:not(:disabled) { background: #00e676; color: black; }
        .btn-opcao:disabled {
            border-color: #444;
            color: #888;
            cursor: not-allowed;
            background: #1a1a1e;
        }
        .contador { font-weight: bold; color: #00e676; margin-top: 5px; }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: #121214;
            color: white;
            border: 1px solid #323238;
            font-size: 16px;
        }
        .btn-enviar {
            background: #00e676;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        #area-restrita {
            margin-top: 30px;
            padding: 20px;
            border-top: 2px dashed #444;
        }
        .secao-admin {
            background: #1a1a1e;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }
        .escondido { display: none; }
        .voto-sucesso { color: #ffd700; font-size: 16px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Qual o conteúdo da Live de hoje?</h1>
    <p>Vote na sua opção favorita (Apenas 1 voto por pessoa)!</p>

    <!-- Opções de Voto -->
    <div>
        <button class="btn-opcao" id="btn-opcao1" onclick="votar('opcao1')">Fazer Trial</button>
        <div class="contador">Votos: <span id="votos-opcao1">0</span></div>
    </div>
    
    <div>
        <button class="btn-opcao" id="btn-opcao2" onclick="votar('opcao2')">Ir Leviatã</button>
        <div class="contador">Votos: <span id="votos-opcao2">0</span></div>
    </div>

    <div>
        <button class="btn-opcao" id="btn-opcao3" onclick="votar('opcao3')">Raids</button>
        <div class="contador">Votos: <span id="votos-opcao3">0</span></div>
    </div>

    <div>
        <button class="btn-opcao" id="btn-opcao4" onclick="votar('opcao4')">Ajudar Iniciantes a subir de level</button>
        <div class="contador">Votos: <span id="votos-opcao4">0</span></div>
    </div>

    <div id="msg-ja-votou" class="voto-sucesso escondido">Sua opção foi registrada com sucesso!</div>

    <hr style="border: 1px solid #323238; margin: 30px 0;">

    <!-- Seção de Sugestão -->
    <h3>Tem outra ideia? Sugira aqui:</h3>
    
    <div id="passo-sugestao">
        <input type="text" id="input-sugestao" placeholder="Ex: Girar fruta e dar pro chat...">
        <br><br>
        <button class="btn-enviar" onclick="proximoPasso()">Avançar</button>
    </div>

    <div id="passo-nome" class="escondido">
        <p>Agora, digite seu nome do TikTok/Roblox:</p>
        <input type="text" id="input-nome" placeholder="Seu nome/Nick...">
        <br><br>
        <button class="btn-enviar" onclick="enviarSugestao()">Enviar Sugestão</button>
    </div>

    <!-- Botão Secreto de Admin -->
    <div id="div-botao-login" style="margin-top: 40px;">
        <button style="background:transparent; color:#3a3a3c; border:none; cursor:pointer;" onclick="fazerLogin()">Painel Restrito</button>
    </div>

    <!-- Área do Admin -->
    <div id="area-restrita" class="escondido">
        <h2 style="color: #ffd700;">Painel de Controle</h2>
        <p>Sugestões dos Fãs:</p>
        <div class="secao-admin" id="lista-sugestoes"></div>
        <br>
        <button onclick="zerarTudo()" style="background:#e67600; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-right:10px;">Resetar Votos para Nova Live</button>
        <button onclick="deslogar()" style="background:#ff4444; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;">Sair</button>
    </div>
</div>

<script>
    try {
        const teste = localStorage.getItem('votos_live');
        if (teste && (!teste.includes('opcao1') || teste.includes('undefined'))) {
            localStorage.clear();
        }
    } catch(e) { localStorage.clear(); }

    if (!localStorage.getItem('votos_live')) {
        localStorage.setItem('votos_live', JSON.stringify({ opcao1: 0, opcao2: 0, opcao3: 0, opcao4: 0 }));
    }
    if (!localStorage.getItem('sugestoes_live')) {
        localStorage.setItem('sugestoes_live', JSON.stringify([]));
    }

    window.addEventListener('load', () => {
        atualizarTela();
        if (localStorage.getItem('logadoLive') === 'true') {
            mostrarPainelAdmin();
        }
    });

    function atualizarTela() {
        const votos = JSON.parse(localStorage.getItem('votos_live'));
        
        document.getElementById('votos-opcao1').innerText = votos.opcao1 || 0;
        document.getElementById('votos-opcao2').innerText = votos.opcao2 || 0;
        document.getElementById('votos-opcao3').innerText = votos.opcao3 || 0;
        document.getElementById('votos-opcao4').innerText = votos.opcao4 || 0;

        if (localStorage.getItem('jaVotouLive') === 'true') {
            for (let i = 1; i <= 4; i++) {
                document.getElementById('btn-opcao' + i).disabled = true;
            }
            document.getElementById('msg-ja-votou').classList.remove('escondido');
        } else {
            for (let i = 1; i <= 4; i++) {
                document.getElementById('btn-opcao' + i).disabled = false;
            }
            document.getElementById('msg-ja-votou').classList.add('escondido');
        }

        const lista = JSON.parse(localStorage.getItem('sugestoes_live'));
        let divLista = document.getElementById('lista-sugestoes');
        divLista.innerHTML = "";
        
        if (!lista || lista.length === 0) {
            divLista.innerHTML = '<p style="color:#888;">Nenhuma sugestão enviada ainda.</p>';
            return;
        }
        lista.forEach(item => {
            divLista.innerHTML = `<p style="border-bottom: 1px solid #29292e; padding-bottom: 5px;"><strong>${item.usuario}:</strong> ${item.texto}</p>` + divLista.innerHTML;
        });
    }

    function votar(idOpcao) {
        if (localStorage.getItem('jaVotouLive') === 'true') return;

        const votos = JSON.parse(localStorage.getItem('votos_live'));
        votos[idOpcao] = (votos[idOpcao] || 0) + 1;
        localStorage.setItem('votos_live', JSON.stringify(votos));
        localStorage.setItem('jaVotouLive', 'true');
        
        atualizarTela();
    }

    let textoTemporario = "";

    function proximoPasso() {
        let txt = document.getElementById('input-sugestao').value;
        if (!txt.trim()) { alert("Escreva sua ideia!"); return; }
        textoTemporario = txt;
        document.getElementById('passo-sugestao').classList.add('escondido');
        document.getElementById('passo-nome').classList.remove('escondido');
    }

    function enviarSugestao() {
        let nome = document.getElementById('input-nome').value;
        if (!nome.trim()) { alert("Digite seu nome!"); return; }

        const lista = JSON.parse(localStorage.getItem('sugestoes_live'));
        lista.push({ usuario: nome, texto: textoTemporario });
        localStorage.setItem('sugestoes_live', JSON.stringify(lista));

        alert("Sugestão enviada com sucesso!");
        document.getElementById('input-sugestao').value = "";
        document.getElementById('input-nome').value = "";
        document.getElementById('passo-nome').classList.add('escondido');
        document.getElementById('passo-sugestao').classList.remove('escondido');
        
        atualizarTela();
    }

    function fazerLogin() {
        let user = prompt("Usuário:");
        let pass = prompt("Senha:");
        if (user === "luffysdrk" && pass === "deussssssss8") {
            localStorage.setItem('logadoLive', 'true');
            mostrarPainelAdmin();
        } else {
            alert("Incorreto!");
        }
    }

    function mostrarPainelAdmin() {
        document.getElementById('area-restrita').classList.remove('escondido');
        document.getElementById('div-botao-login').classList.add('escondido');
        atualizarTela();
    }

    function deslogar() {
        localStorage.removeItem('logadoLive');
        document.getElementById('area-restrita').classList.add('escondido');
        document.getElementById('div-botao-login').classList.remove('escondido');
    }

    function zerarTudo() {
        if (confirm("Quer limpar todos os votos e mensagens para a próxima live?")) {
            localStorage.setItem('votos_live', JSON.stringify({ opcao1: 0, opcao2: 0, opcao3: 0, opcao4: 0 }));
            localStorage.setItem('sugestoes_live', JSON.stringify([]));
            localStorage.removeItem('jaVotouLive');
            atualizarTela();
        }
    }
</script>

</body>
</html>
